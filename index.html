<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* PRODUCTS */
.products{
display:flex;
flex-direction:column;
align-items:center;
gap:50px;
padding:40px 15px;
}

/* CARD */
.card{
width:100%;
max-width:500px;
background:#111;
border-radius:14px;
overflow:hidden;
text-align:center;
position:relative;
}
.card img{width:100%;display:block}

.badge{
position:absolute;
top:12px;
left:12px;
padding:6px 12px;
font-size:11px;
font-weight:600;
border-radius:6px;
}
.pre{background:#00c853}
.ready{background:#fff;color:#000}
.out{background:#ff3b3b}

.disabled{opacity:0.3}

/* BUTTON */
button{
background:#fff;
color:#000;
border:none;
padding:14px;
width:100%;
font-weight:600;
}

/* PAGE SYSTEM */
.page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;
opacity:0;
transform:translateX(30px);
transition:0.4s;
pointer-events:none;
z-index:0;
}
.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
z-index:10;
}

/* DETAIL */
.detail-container{
max-width:600px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:100px;
}

.option-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
.option-box div{
padding:14px;
border:1px solid #555;
text-align:center;
border-radius:8px;
cursor:pointer;
}
.option-box div.active{
background:#fff;
color:#000;
}

.section-label{margin-top:20px;font-size:14px}

/* CHECKOUT */
.checkout-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:80px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

/* SUMMARY ELEGANT */
.summary-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:90px;
}

.sum-block{
margin-bottom:18px;
}

.label{
font-size:12px;
opacity:0.5;
letter-spacing:1px;
margin-bottom:5px;
}

.value{
font-size:16px;
font-weight:500;
}

.price{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.divider{
height:1px;
background:#333;
margin-top:10px;
}

.checkout-btn{
margin-top:30px;
padding:15px;
background:#fff;
color:#000;
font-weight:600;
border:none;
width:100%;
}

/* STICKY */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:10px 15px;
background:#000;
z-index:20;
}

/* BACK */
.back-btn{
position:fixed;
top:15px;
left:15px;
background:#111;
padding:8px 14px;
border-radius:20px;
border:1px solid #333;
z-index:30;
}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:26px;
letter-spacing:4px;
font-weight:600;
transition:0.5s;
}
.loader.hide{opacity:0}

/* TOAST */
.toast{
position:fixed;
top:-60px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:8px;
background:#ff3b3b;
color:#fff;
transition:0.4s;
}
.toast.show{top:20px}
</style>
</head>

<body>

<div id="loader" class="loader">GLORIAM</div>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>GLORIAM - MAKE STAND WITH PRIDE</p>
<p>Scroll to explore</p>
</header>

<div class="products">

<div class="card">
<div class="badge pre">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000 (DP 60000)</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
</div>

<div class="card">
<div class="badge ready">IN STOCK</div>
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100000</p>
<button onclick="goDetail('Sleman Soccer',100000,'ready')">SELECT</button>
</div>

<div class="card">
<div class="badge ready">IN STOCK</div>
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100000</p>
<button onclick="goDetail('Bless Home',100000,'limited')">SELECT</button>
</div>

<div class="card disabled">
<div class="badge out">SOLD OUT</div>
<img src="images/take-me-home.jpg">
<h3>Take Me Home</h3>
<p>Sold Out</p>
<button disabled>SOLD</button>
</div>

</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="back-btn" onclick="goBackHome()">← Back</div>

<div class="detail-container">
<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>
</div>

<div class="sticky-bar">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="back-btn" onclick="goBackDetail()">← Back</div>

<div class="checkout-container">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">

<button onclick="goSummary()">Continue</button>
</div>
</div>

<!-- SUMMARY -->
<div id="summary" class="page">
<div class="back-btn" onclick="goBackCheckout()">← Back</div>

<div class="summary-container">

<div class="sum-block">
<p class="label">PRODUCT</p>
<p id="sProductFull" class="value"></p>
</div>

<div class="sum-block">
<p class="label">PRICE</p>
<p id="sPrice" class="price"></p>
<div class="divider"></div>
</div>

<div class="sum-block">
<p class="label">NAME</p>
<p id="sName" class="value"></p>
</div>

<div class="sum-block">
<p class="label">PHONE</p>
<p id="sPhone" class="value"></p>
</div>

<div class="sum-block">
<p class="label">ADDRESS</p>
<p id="sAddress" class="value"></p>
</div>

<button class="checkout-btn" onclick="sendWA()">CHECKOUT</button>

</div>
</div>

<script>

// LOADER FIX
window.addEventListener('load',()=>{
const loader=document.getElementById('loader');
setTimeout(()=>{
loader.classList.add('hide');
setTimeout(()=>loader.style.display='none',500);
},1000);
});

// TOAST
function showToast(msg){
let t=document.createElement('div');
t.className='toast';
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.classList.add('show'),10);
setTimeout(()=>t.remove(),2000);
}

// STATE
let product='',type='',selectedSize='',selectedColor='';

// DETAIL
function goDetail(n,p,t){
window.scrollTo({top:0,behavior:'smooth'});
product=n;type=t;

home.classList.remove('active');
detail.classList.add('active');

pname.innerText=n;
pprice.innerText='Rp'+p;

let sizes=['S','M','L','XL','XXL','XXXL'];
let html='<div class="section-label">SIZE</div><div class="option-box">';
sizes.forEach(s=>{
html+=`<div onclick="selectSize(this,'${s}')">${s}</div>`;
});
html+='</div>';
sizeWrap.innerHTML=html;

if(t==='pre'){
colorWrap.innerHTML=`<div class="section-label">COLOR</div>
<div class="option-box">
<div onclick="selectColor(this,'Black')">Black</div>
<div onclick="selectColor(this,'Green')">Green</div>
</div>`;
}
}

// NAV
function goBackHome(){detail.classList.remove('active');home.classList.add('active')}
function goBackDetail(){checkout.classList.remove('active');detail.classList.add('active')}
function goBackCheckout(){summary.classList.remove('active');checkout.classList.add('active')}

// SELECT
function selectSize(el,size){
document.querySelectorAll('#sizeWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedSize=size;
}
function selectColor(el,color){
document.querySelectorAll('#colorWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedColor=color;
}

// CHECKOUT
function goCheckout(){
if(!selectedSize){showToast('Select size first');return;}
if(type==='pre'&&!selectedColor){showToast('Select color first');return;}

detail.classList.remove('active');
checkout.classList.add('active');
}

// SUMMARY
function goSummary(){
let nama=name.value.trim();
let hp=phone.value.trim();
let alamat=address.value.trim();

if(!nama||!hp||!alamat){
showToast('Please fill all fields');
return;
}

sProductFull.innerText=`${product} - ${selectedSize} - ${selectedColor}`;
sPrice.innerText= type==='pre'?'Rp110000 (DP 60000)':'Rp100000';
sName.innerText=nama;
sPhone.innerText=hp;
sAddress.innerText=alamat;

checkout.classList.remove('active');
summary.classList.add('active');
}

// WA
function sendWA(){
let nama=name.value.trim();
let hp=phone.value.trim();
let alamat=address.value.trim();

let msg=`Halo, saya ingin order:%0A%0A${product}%0A%0A*Format Order*%0ANama: ${nama}%0AAlamat lengkap: ${alamat}%0ASize: ${selectedSize}%0ANo hp: ${hp}%0AWarna: ${selectedColor}`;

window.location.href=`https://wa.me/6283898588562?text=${msg}`;
}

</script>

</body>
</html>
