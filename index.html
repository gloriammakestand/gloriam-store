<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* PAGE TRANSITION */
.page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;

opacity:0;
transform:translateX(40px);
transition:all 0.4s ease;

pointer-events:none;
z-index:0;
}

.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
z-index:10;
}

.page.exit-left{
transform:translateX(-40px);
opacity:0;
}

.page.exit-right{
transform:translateX(40px);
opacity:0;
}

/* HEADER */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* PRODUCTS */
.products{
display:flex;
flex-direction:column;
align-items:center;
gap:40px;
padding:30px 15px;
}

.card{
width:100%;
max-width:500px;
background:#111;
border-radius:14px;
overflow:hidden;
text-align:center;
position:relative;
}
.card img{width:100%}

.badge{
position:absolute;
top:12px;
left:12px;
padding:6px 12px;
font-size:11px;
border-radius:6px;
}
.pre{background:#00c853}
.ready{background:#fff;color:#000}
.out{background:#ff3b3b}

/* BUTTON */
button{
background:#fff;
color:#000;
border:none;
padding:14px;
width:100%;
font-weight:600;
}

/* DETAIL */
.detail-container{
max-width:600px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:120px;
}

.option-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
.option-box div{
padding:14px;
border:1px solid #555;
text-align:center;
border-radius:8px;
cursor:pointer;
}
.option-box div.active{
background:#fff;
color:#000;
}

/* CHECKOUT */
.checkout-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:120px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

/* SUMMARY */
.summary-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:90px;
padding-bottom:120px;
}

.label{font-size:12px;opacity:0.5}
.value{font-size:16px}
.price{font-size:20px;font-weight:600}
.divider{height:1px;background:#333;margin:10px 0}

/* STICKY */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:10px;
background:#000;
z-index:20;
}

/* BACK */
.back-btn{
position:fixed;
top:15px;
left:15px;
background:#111;
padding:8px 14px;
border-radius:20px;
border:1px solid #333;
z-index:30;
}

/* LOADER */
.loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:26px;
letter-spacing:3px;
}
.loader.hide{opacity:0;transition:0.5s}

/* TOAST */
.toast{
position:fixed;
top:-60px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
padding:10px 20px;
border-radius:6px;
transition:0.3s;
}
.toast.show{top:20px}
</style>
</head>

<body>

<div id="loader" class="loader">GLORIAM</div>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>MAKE STAND WITH PRIDE</p>
</header>

<div class="products">
<div class="card">
<div class="badge pre">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
</div>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="back-btn" onclick="goBackHome()">← Back</div>

<div class="detail-container">
<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>
</div>

<div class="sticky-bar">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="back-btn" onclick="goBackDetail()">← Back</div>

<div class="checkout-container">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">
</div>

<div class="sticky-bar">
<button onclick="goSummary()">CONTINUE</button>
</div>
</div>

<!-- SUMMARY -->
<div id="summary" class="page">
<div class="back-btn" onclick="goBackCheckout()">← Back</div>

<div class="summary-container">
<p class="label">PRODUCT</p>
<p id="sProductFull" class="value"></p>

<p class="label">PRICE</p>
<p id="sPrice" class="price"></p>
<div class="divider"></div>

<p class="label">NAME</p>
<p id="sName" class="value"></p>

<p class="label">PHONE</p>
<p id="sPhone" class="value"></p>

<p class="label">ADDRESS</p>
<p id="sAddress" class="value"></p>
</div>

<div class="sticky-bar">
<button onclick="sendWA()">CHECKOUT</button>
</div>
</div>

<script>

// LOADER
window.onload=()=>{
setTimeout(()=>{
document.getElementById('loader').classList.add('hide');
},1000);
}

// TRANSITION ENGINE
function switchPage(from,to,dir="right"){
from.classList.remove('active');
from.classList.add(dir==="right"?'exit-left':'exit-right');

setTimeout(()=>{
from.classList.remove('exit-left','exit-right');
to.classList.add('active');
window.scrollTo({top:0});
},200);
}

// TOAST
function showToast(msg){
let t=document.createElement('div');
t.className='toast';
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.classList.add('show'),10);
setTimeout(()=>t.remove(),2000);
}

let product='',type='',selectedSize='',selectedColor='';

// DETAIL
function goDetail(n,p,t){
product=n;type=t;

switchPage(home,detail,"right");

pname.innerText=n;
pprice.innerText='Rp'+p;

sizeWrap.innerHTML=`<div class="option-box">
<div onclick="selectSize(this,'S')">S</div>
<div onclick="selectSize(this,'M')">M</div>
<div onclick="selectSize(this,'L')">L</div>
</div>`;

if(t==='pre'){
colorWrap.innerHTML=`<div class="option-box">
<div onclick="selectColor(this,'Black')">Black</div>
<div onclick="selectColor(this,'Green')">Green</div>
</div>`;
}
}

// SELECT
function selectSize(el,s){
document.querySelectorAll('#sizeWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedSize=s;
}
function selectColor(el,c){
document.querySelectorAll('#colorWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedColor=c;
}

// FLOW
function goCheckout(){
if(!selectedSize){showToast('Select size');return;}
if(type==='pre'&&!selectedColor){showToast('Select color');return;}
switchPage(detail,checkout,"right");
}

function goSummary(){
let nama=name.value.trim();
let hp=phone.value.trim();
let alamat=address.value.trim();

if(!nama||!hp||!alamat){
showToast('Isi semua dulu');
return;
}

sProductFull.innerText=`${product} - ${selectedSize} - ${selectedColor}`;
sPrice.innerText='Rp110000';

sName.innerText=nama;
sPhone.innerText=hp;
sAddress.innerText=alamat;

switchPage(checkout,summary,"right");
}

// BACK
function goBackHome(){switchPage(detail,home,"left")}
function goBackDetail(){switchPage(checkout,detail,"left")}
function goBackCheckout(){switchPage(summary,checkout,"left")}

// WA
function sendWA(){
window.location.href="https://wa.me/6283898588562";
}

</script>

</body>
</html>
