<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* PAGE */
.page{display:none;padding-bottom:120px}
.page.active{display:block}

/* HEADER */
header{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

/* PRODUCTS */
.products{
padding:20px;
display:flex;
flex-direction:column;
gap:30px;
align-items:center;
}

.card{
width:100%;
max-width:400px;
background:#111;
border-radius:12px;
overflow:hidden;
text-align:center;
}
.card img{width:100%}

/* BUTTON */
button{
width:100%;
padding:14px;
background:#fff;
color:#000;
border:none;
font-weight:600;
cursor:pointer;
}

/* DETAIL */
.container{padding:20px}

.option-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
.option-box div{
padding:12px;
border:1px solid #555;
text-align:center;
border-radius:8px;
cursor:pointer;
}
.option-box div.active{
background:#fff;
color:#000;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

/* STICKY */
.sticky{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
padding:10px;
display:flex;
justify-content:center;
}
.sticky button{max-width:500px}

/* BACK */
.back{padding:15px}

/* SUMMARY */
.label{opacity:0.5;font-size:12px}
.price{font-size:20px;font-weight:600}
.divider{height:1px;background:#333;margin:10px 0}

/* TOAST */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff3b3b;
padding:10px 20px;
border-radius:6px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>MAKE STAND WITH PRIDE</p>
</header>

<div class="products">

<div class="card">
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000</p>
<button onclick="goDetail('Soccer Addict')">SELECT</button>
</div>

<div class="card">
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100000</p>
<button onclick="goDetail('Sleman Soccer')">SELECT</button>
</div>

<div class="card">
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100000</p>
<button onclick="goDetail('Bless Home')">SELECT</button>
</div>

</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="back" onclick="showPage('home')">← Back</div>

<div class="container">
<h2 id="productName"></h2>

<p>SIZE</p>
<div class="option-box" id="sizeBox">
<div onclick="selectSize(this)">S</div>
<div onclick="selectSize(this)">M</div>
<div onclick="selectSize(this)">L</div>
</div>

<p>COLOR</p>
<div class="option-box" id="colorBox">
<div onclick="selectColor(this)">Black</div>
<div onclick="selectColor(this)">Green</div>
</div>
</div>

<div class="sticky">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="back" onclick="showPage('detail')">← Back</div>

<div class="container">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">
</div>

<div class="sticky">
<button onclick="goSummary()">CONTINUE</button>
</div>
</div>

<!-- SUMMARY -->
<div id="summary" class="page">
<div class="back" onclick="showPage('checkout')">← Back</div>

<div class="container">
<p class="label">PRODUCT</p>
<p id="sumProduct"></p>

<p class="label">PRICE</p>
<p class="price">Rp110000</p>
<div class="divider"></div>

<p class="label">NAME</p>
<p id="sumName"></p>

<p class="label">PHONE</p>
<p id="sumPhone"></p>

<p class="label">ADDRESS</p>
<p id="sumAddress"></p>
</div>

<div class="sticky">
<button onclick="sendWA()">CHECKOUT</button>
</div>
</div>

<script>
let product='',size='',color='';

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo(0,0);
}

function goDetail(name){
product=name;
productName.innerText=name;
showPage('detail');
}

function selectSize(el){
document.querySelectorAll('#sizeBox div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
size=el.innerText;
}

function selectColor(el){
document.querySelectorAll('#colorBox div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
color=el.innerText;
}

function toast(msg){
let t=document.createElement('div');
t.className='toast';
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function goCheckout(){
if(!size){toast('Select size');return;}
if(!color){toast('Select color');return;}
showPage('checkout');
}

function goSummary(){
let n=name.value.trim();
let p=phone.value.trim();
let a=address.value.trim();

if(!n||!p||!a){
toast('Isi semua dulu');
return;
}

sumProduct.innerText=`${product} - ${size} - ${color}`;
sumName.innerText=n;
sumPhone.innerText=p;
sumAddress.innerText=a;

showPage('summary');
}

function sendWA(){
window.location.href="https://wa.me/6283898588562";
}
</script>

</body>
</html>
