<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat',sans-serif;background:#0a0a0a;color:#fff}

header{height:70vh;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:20px}

.card{position:relative;background:#111;border-radius:12px;overflow:hidden}
.card img{width:100%}

.badge{position:absolute;top:10px;left:10px;background:#fff;color:#000;padding:5px 10px;font-size:11px}
.out{background:red;color:#fff}
.disabled{opacity:0.3}

button{background:#fff;color:#000;border:none;padding:14px;width:100%;margin-top:15px;font-weight:600}

.page{display:none}
.active{display:block}

.swipe{display:flex;overflow-x:auto;gap:12px;margin-bottom:20px}
.swipe img{width:85%;border-radius:12px}

.option-box{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.option-box div{padding:14px;border:1px solid #555;text-align:center;cursor:pointer;border-radius:8px}
.option-box div.active{background:#fff;color:#000}
.size-disabled{opacity:0.2;pointer-events:none}

.section-label{margin-top:20px;font-size:14px}

input{width:100%;padding:14px;margin:10px 0;background:#111;border:1px solid #333;color:#fff;border-radius:8px}

.checkout-container{max-width:500px;margin:auto}

.sticky-bar{position:fixed;bottom:0;width:100%;background:#000;padding:10px}

.loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:24px;
letter-spacing:3px;
transition:0.5s;
}
.loader.hide{opacity:0;pointer-events:none}
</style>
</head>

<body>

<div id="loader" class="loader">GLORIAM</div>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>GLORIAM - MAKE STAND WITH PRIDE</p>
<p>Scroll to explore</p>
</header>

<div class="products">

<div class="card">
<div class="badge">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000 (DP 60000)</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
</div>

<div class="card">
<div class="badge">IN STOCK</div>
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100000</p>
<button onclick="goDetail('Sleman Soccer',100000,'ready')">SELECT</button>
</div>

<div class="card">
<div class="badge">IN STOCK</div>
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100000</p>
<button onclick="goDetail('Bless Home',100000,'limited')">SELECT</button>
</div>

<div class="card disabled">
<div class="badge out">SOLD OUT</div>
<img src="images/take-me-home.jpg">
<h3>Take Me Home</h3>
<p>Sold Out</p>
<button disabled>HABIS</button>
</div>

</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div style="padding:20px">

<div class="swipe">
<img src="images/detail1.jpg">
<img src="images/detail2.jpg">
</div>

<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>

</div>

<div class="sticky-bar">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="checkout-container" style="padding:20px">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">
<button onclick="sendWA()">Checkout</button>
</div>
</div>

<script>

// LOADER FIX
window.onload = function(){
  const loader = document.getElementById("loader");
  if(loader){
    loader.classList.add("hide");
    setTimeout(()=>loader.style.display="none",500);
  }
};

let product='',type='',selectedSize='',selectedColor='';

function goDetail(n,p,t){
product=n;type=t;

document.getElementById('home').classList.remove('active');
document.getElementById('detail').classList.add('active');

document.getElementById('pname').innerText=n;
document.getElementById('pprice').innerText='Rp'+p;

let sizes=['S','M','L','XL','XXL','XXXL'];
let html='<div class="section-label">SIZE</div><div class="option-box">';

sizes.forEach(s=>{
if(t==='limited' && !['M','L'].includes(s)){
html+=`<div class="size-disabled">${s}</div>`;
}else{
html+=`<div onclick="selectSize(this,'${s}')">${s}</div>`;
}
});

html+='</div>';
document.getElementById('sizeWrap').innerHTML=html;

// COLOR
if(t==='pre'){
document.getElementById('colorWrap').innerHTML=`
<div class="section-label">COLOR</div>
<div class="option-box">
<div onclick="selectColor(this,'Black')">Black</div>
<div onclick="selectColor(this,'Green')">Green</div>
</div>`;
}else{
selectedColor='Default';
document.getElementById('colorWrap').innerHTML='';
}

}

// SELECT SIZE
function selectSize(el,size){
document.querySelectorAll('#sizeWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedSize=size;
}

// SELECT COLOR
function selectColor(el,color){
document.querySelectorAll('#colorWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedColor=color;
}

// TOAST
function showToast(msg){
let t=document.createElement('div');
t.innerText=msg;
t.style.position='fixed';
t.style.top='20px';
t.style.left='50%';
t.style.transform='translateX(-50%)';
t.style.background='#111';
t.style.padding='10px 20px';
t.style.border='1px solid #333';
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

// CHECKOUT
function goCheckout(){
if(!selectedSize){showToast('Select size first');return;}
if(type==='pre' && !selectedColor){showToast('Select color first');return;}

document.getElementById('detail').classList.remove('active');
document.getElementById('checkout').classList.add('active');
}

// SEND WA
function sendWA(){
let n=name.value;
let p=phone.value;
let a=address.value;

if(!n||!p||!a){showToast('Please fill all fields');return;}

let msg=`Halo, saya ingin order:%0A%0A${product}%0A%0A*Format Order*%0ANama: ${n}%0AAlamat lengkap: ${a}%0ASize: ${selectedSize}%0ANo hp: ${p}%0AWarna: ${selectedColor}`;

window.location.href=`https://wa.me/6283898588562?text=${msg}`;
}

// PWA
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
