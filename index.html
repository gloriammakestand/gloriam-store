<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat',sans-serif;background:#0a0a0a;color:#fff}
header{height:70vh;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:20px}
.card{background:#111;border-radius:12px;overflow:hidden}
.card img{width:100%}
.badge{position:absolute;top:10px;left:10px;background:#fff;color:#000;padding:5px 10px;font-size:11px}
button{background:#fff;color:#000;border:none;padding:14px;width:100%;margin-top:10px}
.page{display:none}
.active{display:block}
.option-box{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.option-box div{padding:12px;border:1px solid #555;text-align:center;cursor:pointer}
.option-box div.active{background:#fff;color:#000}
.size-disabled{opacity:0.2}
.sticky{position:fixed;bottom:0;width:100%;background:#000;padding:10px}
</style>
</head>

<body>

<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>WELCOME TO GLORIAM Website</p>
<p>Scroll to explore</p>
</header>

<div class="products">

<div class="card">
<div class="badge">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000 (DP 60000)</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
</div>

<div class="card">
<div class="badge">IN STOCK</div>
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100000</p>
<button onclick="goDetail('Sleman Soccer',100000,'ready')">SELECT</button>
</div>

<div class="card">
<div class="badge">IN STOCK</div>
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100000</p>
<button onclick="goDetail('Bless Home',100000,'limited')">SELECT</button>
</div>

<div class="card">
<div class="badge" style="background:red;color:white">SOLD OUT</div>
<img src="images/take-me-home.jpg">
<h3>Take Me Home</h3>
<p>Sold Out</p>
<button disabled>HABIS</button>
</div>

</div>
</div>

<div id="detail" class="page">
<div style="padding:20px">
<img src="images/detail1.jpg">
<img src="images/detail2.jpg">
<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>

</div>

<div class="sticky">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<div id="checkout" class="page">
<div style="padding:20px">
<input id="name" placeholder="Nama">
<input id="phone" placeholder="No HP">
<input id="address" placeholder="Alamat lengkap">
<button onclick="sendWA()">Checkout</button>
</div>
</div>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

let product='',type='',selectedSize='',selectedColor='';

function goDetail(n,p,t){
product=n;type=t;
document.getElementById('home').classList.remove('active');
document.getElementById('detail').classList.add('active');
document.getElementById('pname').innerText=n;
document.getElementById('pprice').innerText='Rp'+p;

let sizes=['S','M','L','XL','XXL','XXXL'];
let html='<div class="option-box">';
sizes.forEach(s=>{
if(t==='limited' && !['M','L'].includes(s)){
html+=`<div class="size-disabled">${s}</div>`;
}else{
html+=`<div onclick="selectSize(this,'${s}')">${s}</div>`;
}
});
html+='</div>';
document.getElementById('sizeWrap').innerHTML=html;

if(t==='pre'){
document.getElementById('colorWrap').innerHTML=`
<div class="option-box">
<div onclick="selectColor(this,'Hitam')">Hitam</div>
<div onclick="selectColor(this,'Hijau')">Hijau</div>
</div>`;
}
}

function selectSize(el,s){
document.querySelectorAll('#sizeWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedSize=s;
}

function selectColor(el,c){
document.querySelectorAll('#colorWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedColor=c;
}

function goCheckout(){
if(!selectedSize) return alert('Pilih size dulu');
document.getElementById('detail').classList.remove('active');
document.getElementById('checkout').classList.add('active');
}

function sendWA(){
let n=document.getElementById('name').value;
let p=document.getElementById('phone').value;
let a=document.getElementById('address').value;

let msg=`Halo, saya ingin order:%0A%0A${product}%0A%0A*Format Order*%0ANama: ${n}%0AAlamat lengkap: ${a}%0ASize: ${selectedSize}%0ANo hp: ${p}%0AWarna: ${selectedColor}`;

window.location.href=`https://wa.me/6283898588562?text=${msg}`;
}
</script>

</body>
</html>
