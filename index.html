<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gloriam Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* BASE STYLES */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* PRODUCTS SECTION */
        .products {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 20px 15px 100px;
        }

        /* CARD STYLE */
        .card {
            width: 100%;
            max-width: 450px;
            background: #111;
            border-radius: 14px;
            overflow: hidden;
            text-align: center;
            position: relative;
            border: 1px solid #222;
        }
        .card img { width: 100%; display: block; filter: grayscale(0.2); }
        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 600;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .pre { background: #00c853; color: #fff; }
        .ready { background: #fff; color: #000; }
        .sold { background: #ff3b3b; color: #fff; }

        /* BUTTONS */
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* PAGE TRANSITIONS */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: #0a0a0a;
            opacity: 0;
            transform: translateX(20px);
            transition: 0.4s;
            pointer-events: none;
            z-index: 1;
        }
        .page.active { opacity: 1; transform: translateX(0); pointer-events: auto; z-index: 10; }

        /* OPTIONS STYLING */
        .detail-container { max-width: 500px; margin: auto; padding: 80px 20px 120px; }
        .option-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .option-box div {
            padding: 14px;
            border: 1px solid #333;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #111;
            font-size: 14px;
        }
        .option-box div.active { background: #fff; color: #000; border-color: #fff; }
        .option-box div.disabled { opacity: 0.2; cursor: not-allowed; border: 1px dashed #444; }
        .section-label { margin-top: 25px; font-size: 12px; font-weight: 600; color: #888; letter-spacing: 1px; }

        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 11px; color: #666; font-weight: 600; }
        input, textarea {
            width: 100%; padding: 16px; background: #111; border: 1px solid #222;
            color: #fff; border-radius: 10px; font-family: inherit;
        }
        input:focus { border-color: #fff; outline: none; }

        /* SUMMARY */
        .summary-box { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; }
        .line { border-top: 1px solid #333; margin: 15px 0; }

        /* ANIMATION & NOTIF */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #ff3b3b; color: #fff; padding: 12px 25px; border-radius: 30px;
            transition: 0.5s; z-index: 9999; font-weight: 600; font-size: 13px;
        }
        .toast.show { top: 20px; }

        .loader {
            position: fixed; inset: 0; background: #000; display: flex;
            justify-content: center; align-items: center; z-index: 10000;
            font-size: 20px; letter-spacing: 5px; transition: 0.5s;
        }
        .loader.hide { opacity: 0; pointer-events: none; }

        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 50; cursor: pointer; opacity: 0.7; }
        .sticky-btn { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, #000); z-index: 40; }
    </style>
</head>
<body>

    <div class="loader" id="loader">GLORIAM</div>
    <div id="toast" class="toast">Mohon lengkapi pilihan!</div>

    <div class="page active" id="home">
        <header>
            <h1 style="letter-spacing:8px;">GLORIAM</h1>
            <p style="font-size:10px; opacity:0.5;">MAKE STAND WITH PRIDE</p>
        </header>
        <div class="products" id="product-list"></div>
    </div>

    <div class="page" id="detail">
        <div class="back-btn" onclick="showPage('home')">← BACK</div>
        <div class="detail-container">
            <h2 id="detName">Product</h2>
            <p id="detPrice" style="color:#00c853; font-weight:600;"></p>
            <div id="colorArea"></div>
            <div id="sizeArea"></div>
        </div>
        <div class="sticky-btn"><button onclick="validateDetail()">NEXT</button></div>
    </div>

    <div class="page" id="form">
        <div class="back-btn" onclick="showPage('detail')">← BACK</div>
        <div class="form-container detail-container">
            <h3>SHIPPING INFO</h3>
            <div class="form-group">
                <label>NAMA LENGKAP</label>
                <input type="text" id="inName" placeholder="Masukkan nama...">
            </div>
            <div class="form-group">
                <label>NO HANDPHONE (WA)</label>
                <input type="number" id="inPhone" placeholder="0812...">
            </div>
            <div class="form-group">
                <label>ALAMAT LENGKAP</label>
                <textarea id="inAddress" rows="3" placeholder="Nama jalan, RT/RW, Kec, Kota..."></textarea>
            </div>
            <p style="font-size:11px; color:#666; line-height:1.5;">* Isi sesuai dan lengkap untuk memudahkan proses pengiriman.</p>
        </div>
        <div class="sticky-btn"><button onclick="validateForm()">CONTINUE</button></div>
    </div>

    <div class="page" id="summary">
        <div class="back-btn" onclick="showPage('form')">← BACK</div>
        <div class="summary-container detail-container">
            <h3>ORDER SUMMARY</h3>
            <div class="summary-box">
                <h4 id="sumProd" style="margin:0;">-</h4>
                <p id="sumVar" style="font-size:13px; opacity:0.7;">-</p>
                <h4 id="sumPrice" style="color:#00c853; margin:10px 0 0;">-</h4>
                <div class="line"></div>
                <p id="sumCust" style="font-size:13px; margin:0; line-height:1.6;"></p>
            </div>
            <div style="background:#1a1a1a; padding:15px; border-radius:10px; font-size:12px;">
                <p style="margin:0 0 5px;"><strong>PEMBAYARAN:</strong></p>
                <p style="margin:0; opacity:0.8;">Mandiri: 1370023790229 (Dias A.)</p>
                <p style="margin:0; opacity:0.8;">DANA: 081910421976</p>
            </div>
        </div>
        <div class="sticky-btn"><button onclick="sendWA()" style="background:#00c853; color:#fff;">CHECKOUT (WA)</button></div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Soccer Addict", price: 110000, badge: "pre", status: "PRE ORDER", colors: ["Black", "Green"], sizes: ["S", "M", "L", "XL", "XXL", "XXXL"], stock: ["S", "M", "L", "XL", "XXL", "XXXL"] },
            { id: 2, name: "Sleman Soccer", price: 100000, badge: "ready", status: "READY STOCK", colors: ["White"], sizes: ["S", "M", "L", "XL", "XXL", "XXXL"], stock: ["S", "M", "L", "XL", "XXL", "XXXL"] },
            { id: 3, name: "Bless Home", price: 100000, badge: "ready", status: "READY STOCK", colors: ["Black"], sizes: ["S", "M", "L", "XL", "XXL", "XXXL"], stock: ["M", "L"] },
            { id: 4, name: "Take Me Home", price: 0, badge: "sold", status: "SOLD OUT", colors: [], sizes: [], stock: [] }
        ];

        let cart = { prod: null, size: '', color: '' };

        // 1 DETIK LOAD SCREEN
        window.onload = () => {
            renderHome();
            setTimeout(() => document.getElementById('loader').classList.add('hide'), 1000);
        };

        function renderHome() {
            const container = document.getElementById('product-list');
            products.forEach(p => {
                const isSold = p.badge === 'sold';
                container.innerHTML += `
                    <div class="card">
                        <div class="badge ${p.badge}">${p.status}</div>
                        <img src="https://via.placeholder.com/500x600/111/fff?text=${p.name}">
                        <div style="padding:20px">
                            <h3>${p.name}</h3>
                            <p style="opacity:0.6">${isSold ? 'Stok Habis' : 'Rp' + p.price.toLocaleString()}</p>
                            <button ${isSold ? 'disabled' : ''} onclick="goDetail(${p.id})">
                                ${isSold ? 'OUT OF STOCK' : 'SELECT'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goDetail(id) {
            const p = products.find(x => x.id === id);
            cart = { prod: p, size: '', color: p.colors.length === 1 ? p.colors[0] : '' };
            
            document.getElementById('detName').innerText = p.name;
            document.getElementById('detPrice').innerText = `Rp${p.price.toLocaleString()}`;
            
            // Render Color
            let cHTML = '';
            if(p.colors.length > 0) {
                cHTML = `<div class="section-label">PILIH WARNA</div><div class="option-box">`;
                p.colors.forEach(c => {
                    cHTML += `<div class="${cart.color === c ? 'active' : ''}" onclick="selOpt('color','${c}',this)">${c}</div>`;
                });
                cHTML += `</div>`;
            }
            document.getElementById('colorArea').innerHTML = cHTML;

            // Render Size
            let sHTML = `<div class="section-label">PILIH SIZE</div><div class="option-box">`;
            const allSizes = ["S", "M", "L", "XL", "XXL", "XXXL"];
            allSizes.forEach(s => {
                const isAvailable = p.stock.includes(s);
                sHTML += `<div class="${isAvailable ? '' : 'disabled'}" onclick="${isAvailable ? `selOpt('size','${s}',this)` : ''}">${s}</div>`;
            });
            document.getElementById('sizeArea').innerHTML = sHTML + `</div>`;
            
            showPage('detail');
        }

        function selOpt(type, val, el) {
            cart[type] = val;
            el.parentElement.querySelectorAll('div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            document.querySelector('.page.active').classList.add('shake');
            setTimeout(() => {
                t.classList.remove('show');
                document.querySelector('.page.active').classList.remove('shake');
            }, 2500);
        }

        function validateDetail() {
            if(!cart.color || !cart.size) return notify("Pilih Warna & Size!");
            showPage('form');
        }

        function validateForm() {
            const n = document.getElementById('inName').value;
            const p = document.getElementById('inPhone').value;
            const a = document.getElementById('inAddress').value;
            if(!n || !p || !a) return notify("Lengkapi Data Pengiriman!");
            
            document.getElementById('sumProd').innerText = cart.prod.name;
            document.getElementById('sumVar').innerText = `Warna: ${cart.color} | Size: ${cart.size}`;
            document.getElementById('sumPrice').innerText = `Rp${cart.prod.price.toLocaleString()}`;
            document.getElementById('sumCust').innerHTML = `<strong>${n}</strong><br>${p}<br>${a}`;
            
            showPage('summary');
        }

        function sendWA() {
            const n = document.getElementById('inName').value;
            const p = document.getElementById('inPhone').value;
            const a = document.getElementById('inAddress').value;
            const text = `*GLORIAM ORDER*\n\n${cart.prod.name}\nWarna: ${cart.color}\nSize: ${cart.size}\n\n${n}\nNo WA: ${p}\nAlamat: ${a}`;
            window.open(`https://wa.me/6283898588562?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
