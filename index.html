<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
html,body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* PRODUCTS */
.products{
display:flex;
flex-direction:column;
align-items:center;
gap:50px;
padding:40px 15px;
}

/* CARD */
.card{
width:100%;
max-width:500px;
background:#111;
border-radius:14px;
overflow:hidden;
text-align:center;
position:relative;
}
.card img{width:100%}

.badge{
position:absolute;
top:12px;
left:12px;
padding:6px 12px;
font-size:11px;
font-weight:600;
border-radius:6px;
}
.pre{background:#00c853}
.ready{background:#fff;color:#000}
.out{background:#ff3b3b}

.disabled{opacity:0.3}

/* BUTTON */
button{
background:#fff;
color:#000;
border:none;
padding:14px;
width:100%;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}
button:hover:not(:disabled){background:#f0f0f0}
button:disabled{
background:#333;
color:#888;
cursor:not-allowed;
}

/* PAGE */
.page{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;
overflow-x:hidden;
opacity:0;
transform:translateX(30px);
transition:0.4s;
pointer-events:none;
z-index:0;
}
.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
z-index:10;
}

/* DETAIL */
.detail-container{
max-width:600px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:100px;
}

.swipe{
display:grid;
gap:12px;
}
.swipe img{
width:100%;
border-radius:12px;
}

/* OPTION */
.option-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
.option-box div{
padding:14px;
border:1px solid #555;
text-align:center;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}
.option-box div.active{
background:#fff;
color:#000;
}
.option-box div:hover:not(.active){
background:#222;
}
.size-disabled{
opacity:0.2;
pointer-events:none;
}

.section-label{margin-top:20px;font-size:14px;opacity:0.8}

/* FORM */
.form-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:100px;
}
.form-group{margin-bottom:20px}
.form-group label{
display:block;
margin-bottom:8px;
font-size:13px;
opacity:0.8;
}

/* INPUT + TEXTAREA FIX */
input, textarea{
width:100%;
padding:14px;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:10px;
font-size:16px;
font-family:'Montserrat',sans-serif;
transition:0.2s;
}
input:focus, textarea:focus{
outline:none;
border-color:#fff;
box-shadow:0 0 0 2px rgba(255,255,255,0.1);
}
.error{
border:1px solid red !important;
}

/* SUMMARY */
.summary-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:80px;
padding-bottom:120px;
}
.product-summary,
.customer-info,
.payment-info{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #222;
margin-bottom:20px;
}

/* STICKY */
.sticky-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:15px;
background:#000;
z-index:20;
text-align:center;
}

/* BACK */
.back-btn{
position:fixed;
top:15px;
left:15px;
background:#111;
padding:10px 16px;
border-radius:20px;
border:1px solid #333;
font-size:14px;
z-index:30;
cursor:pointer;
}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:26px;
letter-spacing:4px;
font-weight:600;
transition:0.5s;
}
.loader.hide{opacity:0;pointer-events:none;}

/* TOAST */
.toast{
position:fixed;
top:-60px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:8px;
color:#fff;
transition:0.4s;
font-size:14px;
z-index:1000;
}
.toast.show{top:20px}
.toast.error{background:#ff3b3b}

/* SHAKE */
@keyframes shake{
0%,100%{transform:translateX(-50%)}
25%{transform:translateX(-55%)}
50%{transform:translateX(-45%)}
75%{transform:translateX(-55%)}
}
.toast.shake{animation:shake 0.3s}
</style>
</head>

<body>

<div id="loader" class="loader">GLORIAM</div>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>MAKE STAND WITH PRIDE</p>
</header>

<div class="products">

<div class="card">
<div class="badge pre">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110.000</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
</div>

<div class="card">
<div class="badge ready">READY STOCK</div>
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100.000</p>
<button onclick="goDetail('Sleman Soccer',100000,'ready')">SELECT</button>
</div>

<div class="card">
<div class="badge ready">READY STOCK</div>
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100.000</p>
<button onclick="goDetail('Bless Home',100000,'limited')">SELECT</button>
</div>

<div class="card disabled">
<div class="badge out">SOLD OUT</div>
<img src="images/take-me-home.jpg">
<h3>Take Me Home</h3>
<p>Sold Out</p>
<button disabled>SOLD</button>
</div>

</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="back-btn" onclick="show('home')">← Back</div>

<div class="detail-container">
<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>
</div>

<div class="sticky-bar">
<button onclick="goForm()">NEXT</button>
</div>
</div>

<!-- FORM -->
<div id="form" class="page">
<div class="back-btn" onclick="show('detail')">← Back</div>

<div class="form-container">
<input id="customerName" placeholder="Full Name">
<input id="customerPhone" placeholder="Phone Number">
<textarea id="customerAddress" placeholder="Full Address"></textarea>
</div>

<div class="sticky-bar">
<button onclick="goSummary()">CONTINUE</button>
</div>
</div>

<!-- SUMMARY -->
<div id="summary" class="page">
<div class="back-btn" onclick="show('form')">← Back</div>

<div class="summary-container">
<p id="sumProduct"></p>
<p id="sumSize"></p>
<p id="sumColor"></p>
<p id="sumPrice"></p>

<hr>

<p id="sumCustomerName"></p>
<p id="sumCustomerPhone"></p>
<p id="sumCustomerAddress"></p>
</div>

<div class="sticky-bar">
<button onclick="sendWA()">CHECKOUT</button>
</div>
</div>

<script>

const loader=document.getElementById('loader');
setTimeout(()=>loader.classList.add('hide'),1000);

let order={};

function show(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
window.scrollTo(0,0);
}

function goDetail(n,p,t){
order={product:n,price:p,type:t};

pname.innerText=n;
pprice.innerText=`Rp${p.toLocaleString('id-ID')}`;

// size
let sizes=['S','M','L','XL','XXL','XXXL'];
let html='<div class="section-label">SIZE</div><div class="option-box">';
sizes.forEach(s=>{
if(t==='limited'&&!['M','L'].includes(s)){
html+=`<div class="size-disabled">${s}</div>`;
}else{
html+=`<div onclick="selectOption(this,'size','${s}')">${s}</div>`;
}
});
html+='</div>';
sizeWrap.innerHTML=html;

// color
if(n==='Soccer Addict'){
colorWrap.innerHTML=`<div class="section-label">COLOR</div><div class="option-box"><div onclick="selectOption(this,'color','Black')">Black</div><div onclick="selectOption(this,'color','Green')">Green</div></div>`;
}else{
colorWrap.innerHTML='';
order.color='Black';
}

show('detail');
}

function selectOption(el,type,value){
order[type]=value;

if(type==='size'){
document.querySelectorAll('#sizeWrap .option-box div').forEach(d=>d.classList.remove('active'));
}else{
document.querySelectorAll('#colorWrap .option-box div').forEach(d=>d.classList.remove('active'));
}

el.classList.add('active');
}

function toast(msg){
let t=document.createElement('div');
t.className='toast error';
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.classList.add('show','shake'),10);
setTimeout(()=>t.remove(),2000);
if(navigator.vibrate) navigator.vibrate([100,50,100]);
}

function goForm(){
if(!order.size)return toast('Pilih size dulu');
if(order.type==='pre'&&!order.color)return toast('Pilih warna');
show('form');
}

function goSummary(){
let n=customerName.value.trim();
let p=customerPhone.value.trim();
let a=customerAddress.value.trim();

if(!n||!p||!a)return toast('Lengkapi data');

sumProduct.innerText=order.product;
sumSize.innerText=`Size: ${order.size}`;
sumColor.innerText=`Color: ${order.color}`;
sumPrice.innerText=`Rp${order.price.toLocaleString('id-ID')}`;

sumCustomerName.innerText=n;
sumCustomerPhone.innerText=p;
sumCustomerAddress.innerText=a;

show('summary');
}

function sendWA(){
let msg=`Order:%0A${order.product}%0ASize:${order.size}%0AColor:${order.color}%0ANama:${customerName.value}%0AHP:${customerPhone.value}%0AAlamat:${customerAddress.value}`;
window.open(`https://wa.me/6283898588562?text=${msg}`);
}

</script>

</body>
</html>
