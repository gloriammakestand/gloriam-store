<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* ================= HEADER ================= */
header{
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.title{
    letter-spacing:10px;
    font-size:40px;
}

.subtitle{
    opacity:.6;
    font-size:12px;
}

/* ================= PRODUCT ================= */
.products{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:50px;
    padding:40px 15px;
}

.card{
    width:100%;
    max-width:500px;
    background:#111;
    border-radius:14px;
    overflow:hidden;
    position:relative;
    text-align:center;
}

.card img{
    width:100%;
}

/* BADGE */
.badge{
    position:absolute;
    top:12px;
    left:12px;
    padding:6px 12px;
    font-size:11px;
    font-weight:600;
    border-radius:6px;
}

.pre{background:#00c853;}
.ready{background:#fff;color:#000;}
.out{background:#ff3b3b;}

/* ================= BUTTON ================= */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover:not(:disabled){
    background:#f0f0f0;
}

button:disabled{
    background:#333;
    color:#888;
    cursor:not-allowed;
}

/* ================= PAGE ================= */
.page{
    position:fixed;
    inset:0;
    overflow-y:auto;
    opacity:0;
    transform:translateX(30px);
    transition:.4s;
    pointer-events:none;
}

.page.active{
    opacity:1;
    transform:none;
    pointer-events:auto;
    z-index:10;
}

/* ================= DETAIL ================= */
.detail-container,
.form-container,
.summary-container{
    max-width:600px;
    margin:auto;
    padding:80px 20px 100px;
}

.swipe{
    display:grid;
    gap:12px;
}

.swipe img{
    width:100%;
    border-radius:12px;
}

/* OPTIONS */
.section-label{
    margin-top:20px;
    font-size:13px;
    opacity:.7;
    letter-spacing:1px;
}

.option-box{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:10px;
}

.option-box div{
    padding:14px;
    border:1px solid #333;
    border-radius:8px;
    text-align:center;
    cursor:pointer;
    background:#111;
}

.option-box div.active{
    background:#fff;
    color:#000;
    border-color:#fff;
}

/* ================= FORM ================= */
.form-group{
    margin-bottom:20px;
}

.form-group label{
    font-size:12px;
    color:#aaa;
}

input,textarea{
    width:100%;
    padding:16px;
    background:#111;
    border:1px solid #222;
    color:#fff;
    border-radius:12px;
    margin-top:6px;
}

input:focus,textarea:focus{
    outline:none;
    border-color:#fff;
}

/* ================= SUMMARY ================= */
.product-summary,
.customer-info,
.payment-info{
    background:#111;
    padding:20px;
    border-radius:12px;
    border:1px solid #222;
    margin-bottom:20px;
}

.payment-info{
    background:#1a1a1a;
}

.payment-info h4{
    color:#00c853;
}

/* ================= UTIL ================= */
.back-btn{
    position:fixed;
    top:15px;
    left:15px;
    background:#111;
    padding:10px 16px;
    border-radius:20px;
    border:1px solid #333;
    cursor:pointer;
    z-index:20;
}

.sticky-bar{
    position:fixed;
    bottom:0;
    width:100%;
    padding:15px;
    background:rgba(0,0,0,.8);
}

/* LOADER */
.loader{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-size:26px;
    letter-spacing:4px;
    z-index:9999;
    transition:.5s;
}

.loader.hide{
    opacity:0;
    pointer-events:none;
}

/* TOAST */
.toast{
    position:fixed;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    border-radius:8px;
    transition:.4s;
}

.toast.show{top:20px;}
.toast.error{background:#ff3b3b;}
</style>
</head>

<body>

<div class="loader" id="loader">GLORIAM</div>

<!-- ================= HOME ================= -->
<div class="page active" id="home">
    <header>
        <h1 class="title">GLORIAM</h1>
        <p class="subtitle">GLORIAM - MAKE STAND WITH PRIDE</p>
    </header>

    <div class="products">
        <div class="card">
            <div class="badge pre">PRE ORDER</div>
            <img src="https://via.placeholder.com/500">
            <div style="padding:20px">
                <h3>Soccer Addict</h3>
                <p style="opacity:.7">Rp110.000 (DP 60.000)</p>
                <button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT</button>
            </div>
        </div>
    </div>
</div>

<!-- ================= DETAIL ================= -->
<div class="page" id="detail">
    <div class="back-btn" onclick="showPage('home')">← Back</div>

    <div class="detail-container">
        <div class="swipe">
            <img src="https://via.placeholder.com/500">
        </div>

        <h2 id="pname"></h2>
        <h3 id="pprice" style="color:#00c853"></h3>

        <div id="sizeWrap"></div>
        <div id="colorWrap"></div>
    </div>

    <div class="sticky-bar">
        <button onclick="goForm()">NEXT</button>
    </div>
</div>

<script>

/* ================= STATE ================= */
let order={
    product:'',price:0,type:'',
    size:'',color:'',
    name:'',phone:'',address:''
};

/* ================= PAGE ================= */
function showPage(id){
    document.querySelectorAll('.page')
        .forEach(p=>p.classList.remove('active'));

    document.getElementById(id).classList.add('active');
}

/* ================= DETAIL ================= */
function goDetail(name,price,type){
    order={...order,product:name,price,type,size:'',color:''};

    document.getElementById('pname').innerText=name;
    document.getElementById('pprice').innerText=
        `Rp${price.toLocaleString('id-ID')}`;

    renderOptions();
    showPage('detail');
}

/* OPTIONS */
function renderOptions(){
    const sizes=['S','M','L','XL','XXL','XXXL'];

    document.getElementById('sizeWrap').innerHTML=
        createOption('SIZE','size',sizes);

    if(order.type==='pre'){
        document.getElementById('colorWrap').innerHTML=
            createOption('COLOR','color',['Black','Green']);
    }else{
        document.getElementById('colorWrap').innerHTML='';
    }
}

function createOption(label,type,list){
    return `
    <div class="section-label">${label}</div>
    <div class="option-box">
        ${list.map(v=>`
            <div onclick="selectOption(this,'${type}','${v}')">
                ${v}
            </div>`).join('')}
    </div>`;
}

function selectOption(el,type,val){
    order[type]=val;

    el.parentElement.querySelectorAll('div')
        .forEach(d=>d.classList.remove('active'));

    el.classList.add('active');
}

/* ================= VALIDATION ================= */
function goForm(){
    if(!order.size) return toast('Pilih size dulu');
    if(order.type==='pre' && !order.color) return toast('Pilih warna');

    showPage('form');
}

/* ================= TOAST ================= */
function toast(msg){
    const t=document.createElement('div');
    t.className='toast error show';
    t.innerText=msg;

    document.body.appendChild(t);

    setTimeout(()=>t.remove(),2000);
}

/* ================= LOADER ================= */
window.onload=()=>{
    setTimeout(()=>{
        document.getElementById('loader')
            .classList.add('hide');
    },1000);
}

</script>

</body>
</html>
