<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloriam Store</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0a0a0a;
color:#fff;
overflow-x:hidden; /* FIX GESER */
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
}

/* HEADER */
header{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* PRODUCTS */
.products{
display:flex;
flex-direction:column;
align-items:center;
gap:50px;
padding:40px 15px;
}

/* CARD */
.card{
width:100%;
max-width:500px;
background:#111;
border-radius:14px;
overflow:hidden;
text-align:center;
position:relative;
}
.card img{width:100%}

/* BADGE */
.badge{
position:absolute;
top:12px;
left:12px;
padding:6px 12px;
font-size:11px;
font-weight:600;
border-radius:6px;
}
.badge.pre{background:#00c853;color:#fff}
.badge.ready{background:#fff;color:#000}
.badge.out{background:#ff3b3b;color:#fff}

.disabled{opacity:0.3}

/* TEXT */
h3{margin:15px 0 5px;font-size:18px}
p{margin:0 0 15px;opacity:0.7}

/* BUTTON */
button{
background:#fff;
color:#000;
border:none;
padding:14px;
width:100%;
font-weight:600;
}
button:disabled{
background:#333;
color:#888;
}

/* PAGE */
.page{
position:absolute;
width:100%;
top:0;
left:0;
opacity:0;
transform:translateX(30px);
transition:0.4s;
pointer-events:none;
}
.page.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
}

/* DETAIL */
.detail-container{
max-width:600px;
margin:auto;
padding:20px;
padding-top:70px;
padding-bottom:100px;
}

/* IMAGE DETAIL (NO SWIPE) */
.swipe{
display:grid;
grid-template-columns:1fr;
gap:12px;
}
.swipe img{
width:100%;
border-radius:12px;
}

/* OPTION */
.option-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
.option-box div{
padding:14px;
border:1px solid #555;
text-align:center;
border-radius:8px;
cursor:pointer;
}
.option-box div.active{
background:#fff;
color:#000;
}
.size-disabled{
opacity:0.2;
pointer-events:none;
}

.section-label{margin-top:20px;font-size:14px}

/* CHECKOUT */
.checkout-container{
max-width:500px;
margin:auto;
padding:20px;
padding-top:70px;
}
input{
width:100%;
padding:14px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

/* STICKY */
.sticky-bar{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:10px 15px;
}

/* BACK */
.back-btn{
position:fixed;
top:15px;
left:15px;
background:#111;
padding:8px 14px;
border-radius:20px;
border:1px solid #333;
z-index:999;
}

/* LOADER PERFECT CENTER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:26px;
letter-spacing:4px;
font-weight:600;
text-align:center;
transition:0.5s;
}
.loader.hide{
opacity:0;
pointer-events:none;
}

/* TOAST */
.toast{
position:fixed;
top:-60px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:8px;
color:#fff;
transition:0.4s;
}
.toast.show{top:20px}
.toast.error{background:#ff3b3b}

/* SHAKE */
@keyframes shake{
0%{transform:translateX(-50%)}
25%{transform:translateX(-55%)}
50%{transform:translateX(-45%)}
75%{transform:translateX(-55%)}
100%{transform:translateX(-50%)}
}
.toast.shake{animation:shake 0.3s}
</style>
</head>

<body>

<div id="loader" class="loader">GLORIAM</div>

<!-- HOME -->
<div id="home" class="page active">
<header>
<h1>GLORIAM</h1>
<p>GLORIAM - MAKE STAND WITH PRIDE</p>
<p>Scroll to explore</p>
</header>

<div class="container">
<div class="products">

<div class="card">
<div class="badge pre">PRE ORDER</div>
<img src="images/soccer-addict.jpg">
<h3>Soccer Addict</h3>
<p>Rp110000 (DP 60000)</p>
<button onclick="goDetail('Soccer Addict',110000,'pre')">SELECT OPTIONS</button>
</div>

<div class="card">
<div class="badge ready">IN STOCK</div>
<img src="images/sleman-soccer.jpg">
<h3>Sleman Soccer</h3>
<p>Rp100000</p>
<button onclick="goDetail('Sleman Soccer',100000,'ready')">SELECT OPTIONS</button>
</div>

<div class="card">
<div class="badge ready">IN STOCK</div>
<img src="images/bless-home.jpg">
<h3>Bless Home</h3>
<p>Rp100000</p>
<button onclick="goDetail('Bless Home',100000,'limited')">SELECT OPTIONS</button>
</div>

<div class="card disabled">
<div class="badge out">SOLD OUT</div>
<img src="images/take-me-home.jpg">
<h3>Take Me Home</h3>
<p>Sold Out</p>
<button disabled>SOLD</button>
</div>

</div>
</div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
<div class="back-btn" onclick="goBackHome()">← Back</div>

<div class="detail-container">

<div class="swipe">
<img src="images/detail1.jpg">
<img src="images/detail2.jpg">
</div>

<h2 id="pname"></h2>
<p id="pprice"></p>

<div id="sizeWrap"></div>
<div id="colorWrap"></div>

</div>

<div class="sticky-bar">
<button onclick="goCheckout()">ADD TO CART</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
<div class="back-btn" onclick="goBackDetail()">← Back</div>

<div class="checkout-container">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">
<button onclick="sendWA()">Checkout</button>
</div>
</div>

<script>

// LOADER
window.onload=()=>{
setTimeout(()=>{
loader.classList.add("hide");
setTimeout(()=>loader.style.display="none",500);
},1000);
};

let product='',type='',selectedSize='',selectedColor='';

// NAV
function goDetail(n,p,t){
product=n;type=t;
home.classList.remove('active');
detail.classList.add('active');
pname.innerText=n;
pprice.innerText='Rp'+p;

let sizes=['S','M','L','XL','XXL','XXXL'];
let html='<div class="section-label">SIZE</div><div class="option-box">';
sizes.forEach(s=>{
if(t==='limited' && !['M','L'].includes(s)){
html+=`<div class="size-disabled">${s}</div>`;
}else{
html+=`<div onclick="selectSize(this,'${s}')">${s}</div>`;
}
});
html+='</div>';
sizeWrap.innerHTML=html;

if(t==='pre'){
colorWrap.innerHTML=`
<div class="section-label">COLOR</div>
<div class="option-box">
<div onclick="selectColor(this,'Black')">Black</div>
<div onclick="selectColor(this,'Green')">Green</div>
</div>`;
}else{
selectedColor='Default';
colorWrap.innerHTML='';
}
}

function goBackHome(){
detail.classList.remove('active');
home.classList.add('active');
}

function goBackDetail(){
checkout.classList.remove('active');
detail.classList.add('active');
}

// SELECT
function selectSize(el,size){
document.querySelectorAll('#sizeWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedSize=size;
}
function selectColor(el,color){
document.querySelectorAll('#colorWrap div').forEach(d=>d.classList.remove('active'));
el.classList.add('active');
selectedColor=color;
}

// TOAST + GETER
function showToast(msg){
let t=document.createElement('div');
t.className='toast error';
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.classList.add('show'),10);
t.classList.add('shake');
setTimeout(()=>t.remove(),2000);
if(navigator.vibrate) navigator.vibrate([100,50,100]);
}

// CHECKOUT
function goCheckout(){
if(!selectedSize){showToast('Select size first');return;}
if(type==='pre' && !selectedColor){showToast('Select color first');return;}
detail.classList.remove('active');
checkout.classList.add('active');
}

// WA
function sendWA(){
if(!name.value||!phone.value||!address.value){
showToast('Please fill all fields');
return;
}

let msg=`Halo, saya ingin order:%0A%0A${product}%0A%0A*Format Order*%0ANama: ${name.value}%0AAlamat lengkap: ${address.value}%0ASize: ${selectedSize}%0ANo hp: ${phone.value}%0AWarna: ${selectedColor}`;

window.location.href=`https://wa.me/6283898588562?text=${msg}`;
}

</script>

</body>
</html>
